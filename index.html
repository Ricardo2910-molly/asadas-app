<style>
:root{
  --bg:#EEF5F4;
  --surface:#FFFFFF;
  --ink:#14302D;
  --ink-soft:#5C7572;
  --line:#DCE8E6;
  --teal:#0E4F52;
  --teal-dark:#0A3638;
  --teal-mist:#DCEEEC;
  --cyan:#1E9AA0;
  --a-bg:#E1F3E7; --a-fg:#1F7A46; --a-dot:#2E9A5B;
  --b-bg:#FBF0D8; --b-fg:#966016; --b-dot:#D79A2A;
  --c-bg:#FBE7E4; --c-fg:#A83E32; --c-dot:#C24E40;
  --radius:14px;
  --shadow:0 1px 2px rgba(14,79,82,.06), 0 6px 20px -8px rgba(14,79,82,.18);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;}
body{min-height:100vh;}
.mono{font-family:'IBM Plex Mono',monospace;}
.display{font-family:'Space Grotesk',system-ui,sans-serif;}

/* HEADER */
header{
  position:sticky; top:0; z-index:30;
  background:linear-gradient(180deg, var(--teal-dark), var(--teal));
  color:#fff; padding:18px 16px 14px;
  box-shadow:var(--shadow);
}
header .top-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
header h1{font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:700; margin:0; letter-spacing:-.01em;}
header .sub{font-size:11.5px; color:#BFE0DD; margin-top:2px; font-weight:500; letter-spacing:.02em; text-transform:uppercase;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.12); display:flex;align-items:center;justify-content:center; flex-shrink:0;}

.search-wrap{margin-top:14px; position:relative;}
.search-wrap input{
  width:100%; padding:11px 14px 11px 38px; border-radius:12px; border:none;
  background:rgba(255,255,255,.14); color:#fff; font-size:14.5px; font-family:inherit;
  outline:none;
}
.search-wrap input::placeholder{color:#AEDAD6;}
.search-wrap svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); opacity:.8;}
.search-wrap input:focus{background:rgba(255,255,255,.22);}

/* FLOW METER - signature element */
.flow-meter{margin:14px 16px 0; background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:12px 14px 14px;}
.flow-meter .flabel{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
.flow-meter .flabel .ftitle{font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-soft); font-weight:600;}
.flow-meter .flabel .ftotal{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono',monospace;}
.flow-bar{display:flex; height:10px; border-radius:6px; overflow:hidden; background:var(--line); width:100%;}
.flow-bar span{height:100%; transition:width .4s ease;}
.flow-legend{display:flex; flex-wrap:wrap; gap:10px 14px; margin-top:9px;}
.flow-legend .fitem{display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft); font-weight:500;}
.flow-legend .fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* FILTERS */
.filters{display:flex; gap:8px; overflow-x:auto; padding:14px 16px 4px; scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0; padding:7px 13px; border-radius:20px; font-size:12.5px; font-weight:600;
  background:var(--surface); color:var(--ink-soft); border:1px solid var(--line); cursor:pointer;
  display:flex; align-items:center; gap:5px; user-select:none;
}
.chip.active{background:var(--teal); color:#fff; border-color:var(--teal);}
.chip .cdot{width:7px;height:7px;border-radius:50%;}
select.chip-select{
  flex-shrink:0; padding:7px 26px 7px 13px; border-radius:20px; font-size:12.5px; font-weight:600;
  background:var(--surface) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%235C7572' stroke-width='1.5' fill='none'/></svg>") no-repeat right 10px center;
  color:var(--ink-soft); border:1px solid var(--line); appearance:none; -webkit-appearance:none;
}

.result-count{padding:10px 16px 2px; font-size:12px; color:var(--ink-soft); font-weight:500;}
.result-count b{color:var(--ink);}
.backup-row{display:flex; gap:8px; padding:12px 16px 0;}
.backup-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  padding:9px 10px; border-radius:10px; border:1px solid var(--line); background:var(--surface);
  color:var(--ink-soft); font-size:11.5px; font-weight:600; cursor:pointer; font-family:inherit;
}
.backup-btn:active{background:var(--teal-mist); color:var(--teal);}

/* LIST */
#list{padding:8px 16px 90px; display:flex; flex-direction:column; gap:9px;}
.card{
  background:var(--surface); border-radius:12px; box-shadow:var(--shadow);
  padding:12px 13px; display:flex; gap:11px; cursor:pointer; border:1px solid transparent;
  transition:transform .12s ease;
}
.card:active{transform:scale(.98);}
.pbar{width:4px; border-radius:3px; flex-shrink:0;}
.card-body{flex:1; min-width:0;}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
.card-name{font-weight:600; font-size:14px; line-height:1.3; color:var(--ink);}
.card-loc{font-size:11.5px; color:var(--ink-soft); margin-top:2px;}
.card-tags{display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;}
.tag{font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:6px; display:flex; align-items:center; gap:4px;}
.tag.ok{background:var(--teal-mist); color:var(--teal);}
.tag.missing{background:#F2F2F2; color:#A6A6A6;}
.status-badge{font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; white-space:nowrap; text-transform:uppercase; letter-spacing:.02em;}

.load-more{display:block; width:calc(100% - 32px); margin:6px 16px 0; padding:12px; border-radius:12px; border:1px dashed var(--line); background:transparent; color:var(--teal); font-weight:600; font-size:13px; cursor:pointer;}

.empty{padding:60px 30px; text-align:center; color:var(--ink-soft);}
.empty .display{font-size:15px; color:var(--ink); margin-bottom:4px;}

/* MODAL */
.overlay{position:fixed; inset:0; background:rgba(10,30,28,.45); z-index:50; display:none; align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{
  background:var(--surface); width:100%; max-height:92vh; overflow-y:auto;
  border-radius:20px 20px 0 0; padding:0 0 24px; animation:slideup .25s ease;
}
@keyframes slideup{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.sheet-handle{width:36px;height:4px;background:var(--line); border-radius:3px; margin:10px auto 4px;}
.sheet-header{padding:6px 20px 16px; border-bottom:1px solid var(--line);}
.sheet-header .hp{display:flex;align-items:center;gap:7px; margin-bottom:6px;}
.sheet-header h2{font-family:'Space Grotesk',sans-serif; font-size:18px; margin:0; line-height:1.3;}
.name-input{
  font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:600; line-height:1.3; color:var(--ink);
  border:none; border-bottom:1.5px dashed transparent; background:transparent; width:100%; padding:2px 0;
  outline:none; font-family:'Space Grotesk',sans-serif;
}
.name-input:focus, .name-input:hover{border-bottom-color:var(--teal);}
.sheet-header .loc{font-size:12.5px; color:var(--ink-soft); margin-top:3px;}
.close-btn{position:absolute; top:14px; right:16px; width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);}

.actions-row{display:flex; gap:8px; padding:16px 20px 4px;}
.action-btn{
  flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; padding:11px 6px;
  border-radius:12px; border:1px solid var(--line); background:var(--surface); text-decoration:none;
  color:var(--ink); font-size:11px; font-weight:600; cursor:pointer;
}
.action-btn.wa{color:#1F7A46;}
.action-btn.call{color:var(--teal);}
.action-btn.mail{color:#966016;}
.action-btn[disabled]{opacity:.35; pointer-events:none;}
.action-btn svg{width:19px;height:19px;}

.field-group{padding:14px 20px;}
.field-group label{display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin-bottom:6px;}
.field-group + .field-group{padding-top:0;}
select.field-input, input.field-input, textarea.field-input{
  width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line); background:var(--bg);
  font-family:inherit; font-size:14px; color:var(--ink); outline:none;
}
select.field-input{appearance:none; -webkit-appearance:none; background:var(--bg) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' stroke='%235C7572' stroke-width='1.5' fill='none'/></svg>") no-repeat right 14px center;}
textarea.field-input{resize:vertical; min-height:64px; font-family:inherit;}
.field-input:focus{border-color:var(--teal);}
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 20px 14px;}
.two-col .field-group{padding:0;}
.system-card{margin:10px 20px 0; background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:12px 12px 2px;}
.system-card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.system-label{font-size:12.5px; font-weight:700; color:var(--teal);}
.system-remove{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--c-fg);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.system-card .two-col{padding:0 0 12px;}
.add-system-btn{
  display:flex; align-items:center; justify-content:center; gap:6px; width:calc(100% - 40px);
  margin:12px 20px 0; padding:10px; border-radius:10px; border:1px dashed var(--teal);
  background:var(--teal-mist); color:var(--teal); font-weight:600; font-size:13px; cursor:pointer; font-family:inherit;
}
.summary-title{padding:16px 20px 8px; font-size:12px; font-weight:600; color:var(--ink);}
.summary-table-wrap{padding:0 20px 6px; overflow-x:auto;}
.summary-table{width:100%; border-collapse:collapse; font-size:11.5px; min-width:430px;}
.summary-table th{background:var(--teal-mist); color:var(--teal); font-weight:700; text-align:left; padding:7px 8px; white-space:nowrap;}
.summary-table td{padding:7px 8px; border-bottom:1px solid var(--line); white-space:nowrap;}
.summary-table tfoot td{font-weight:700; border-top:1.5px solid var(--teal); border-bottom:none; background:var(--teal-mist);}
.status-pill{display:inline-block; padding:3px 9px; border-radius:20px; font-size:10.5px; font-weight:700; white-space:nowrap;}
.status-pill.st-red{background:var(--c-bg); color:var(--c-fg);}
.status-pill.st-amber{background:var(--b-bg); color:var(--b-fg);}
.status-pill.st-green{background:var(--a-bg); color:var(--a-fg);}
.status-pill.st-gray{background:#EFEFEF; color:#8A8A8A;}
.compliance-empty{padding:0 20px 14px; font-size:12px; color:var(--ink-soft); line-height:1.5;}
.section-subtitle{padding:12px 0 6px; font-size:10.5px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em;}
.analysis-mini{margin:0 20px 14px; padding:10px 12px; background:var(--teal-mist); border-radius:10px; font-size:11px; color:var(--teal-dark); line-height:1.6;}
.analysis-obs-line{opacity:.92;}
.analysis-total-line{margin-top:6px; font-weight:700; color:var(--teal-dark);}
.autofill-btn{
  display:flex; align-items:center; justify-content:center; gap:6px; width:100%;
  padding:9px; margin-bottom:10px; border-radius:9px; border:1px dashed var(--teal);
  background:var(--surface); color:var(--teal); font-size:11.5px; font-weight:600; cursor:pointer; font-family:inherit;
}
.gcal-mini{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--teal);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;vertical-align:middle;margin-left:6px;}
.order-card{margin:10px 20px 0; background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:12px 12px 2px;}
.order-card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.order-label{font-size:12.5px; font-weight:700; color:var(--teal);}
.order-card .two-col{padding:0 0 12px;}
.four-col{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:0 0 12px;}
.four-col .field-group label{font-size:9.5px;}
.four-col .field-group input{padding:9px 6px; text-align:center;}
.order-total{padding:0 0 12px; font-size:12px; color:var(--ink-soft); font-weight:600;}
.order-total b{color:var(--teal); font-size:14px;}
.gcal-btn{
  display:flex; align-items:center; justify-content:center; gap:6px; width:100%;
  padding:9px; margin-bottom:12px; border-radius:9px; border:1px solid var(--teal);
  background:var(--surface); color:var(--teal); font-weight:600; font-size:12px; cursor:pointer; text-decoration:none; font-family:inherit;
}
.proforma-row{margin:10px 20px 0; padding:10px; background:var(--bg); border:1px solid var(--line); border-radius:10px; display:flex; gap:8px; align-items:flex-end;}
.proforma-row .field-group{flex:1; padding:0;}
.proforma-row .field-group label{font-size:9.5px;}
.send-confirm-btn{
  width:calc(100% - 40px); margin:16px 20px 0; padding:12px; border-radius:12px; border:none;
  background:var(--teal); color:#fff; font-weight:600; font-size:13px; font-family:inherit;
  display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
}
.send-confirm-btn svg{width:16px;height:16px;}
.send-confirm-btn[disabled]{opacity:.4; pointer-events:none;}
.send-confirm-hint{padding:7px 20px 0; font-size:11px; color:var(--ink-soft); text-align:center;}

.meta-block{padding:12px 20px 4px; display:flex; flex-direction:column; gap:8px;}
.section-title{padding:16px 20px 4px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--teal); border-top:1px solid var(--line); margin-top:6px;}
.edit-hint{text-transform:none; font-weight:500; letter-spacing:0; color:var(--ink-soft); font-size:10.5px;}
.extra-row{margin:10px 20px 0; padding:10px; background:var(--bg); border:1px solid var(--line); border-radius:10px;}
.extra-row .field-group label{font-size:9.5px;}
.extra-row-remove{width:36px;height:36px;flex-shrink:0;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--c-fg);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.extra-row-actions-bottom{display:flex; gap:8px; align-items:center;}
.wa-extra-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:9px;
  border-radius:9px; border:1px solid #1F7A46; background:var(--a-bg); color:#1F7A46;
  font-weight:600; font-size:12.5px; text-decoration:none;
}
.wa-extra-btn[disabled]{opacity:.35; pointer-events:none;}
.save-manual-btn{
  width:calc(100% - 40px); margin:16px 20px 8px; padding:14px; border-radius:12px; border:none;
  background:var(--teal); color:#fff; font-weight:700; font-size:14px; font-family:inherit;
  display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
}
.save-manual-btn.saved{background:#1F7A46;}
.meta-row{display:flex; justify-content:space-between; font-size:12.5px; padding:8px 0; border-bottom:1px solid var(--line);}
.meta-row span:first-child{color:var(--ink-soft); font-weight:500;}
.meta-row span:last-child{font-weight:600; text-align:right;}

.save-hint{padding:14px 20px 0; font-size:11px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;}
.save-hint.saved{color:#1F7A46;}

@media(min-width:640px){
  .sheet{max-width:480px; margin:0 auto; border-radius:20px; margin-bottom:24px;}
  .overlay{align-items:center; justify-content:center;}
}
</style>

let statuses = {};
let activePrioridad = "ALL";
let activeRegion = "ALL";
let activeProvincia = "ALL";
let activeCanton = "ALL";
let activeEstado = "ALL";
let searchTerm = "";
let renderLimit = 60;
let currentDetailIdeo = null;
let currentDetailD = null;
let currentProformas = [];
let currentMuestreos = [];

function estadoOf(ideo){
  return (statuses[ideo] && statuses[ideo].estado) || "Pendiente";
}

function effectiveTelefono(d){
  const st = statuses[d.IDEO];
  if(st && st.telefono !== undefined) return st.telefono;
  return d["Teléfono"] || '';
}

function effectiveWhatsapp(d){
  const st = statuses[d.IDEO];
  if(st && st.whatsapp !== undefined && st.whatsapp !== '') return st.whatsapp;
  return effectiveTelefono(d);
}

function effectiveCorreo(d){
  const st = statuses[d.IDEO];
  if(st && st.correo !== undefined) return st.correo;
  return d["Correo"] || '';
}

function effectiveNombre(d){
  const st = statuses[d.IDEO];
  if(st && st.nombre !== undefined && st.nombre !== '') return st.nombre;
  return d.Nombre;
}

async function loadStatuses(){
  try{
    const raw = localStorage.getItem('estados_seguimiento');
    if(raw){ statuses = JSON.parse(raw); }
  }catch(e){ statuses = {}; }
  renderAll();
}

async function saveStatuses(){
  try{
    localStorage.setItem('estados_seguimiento', JSON.stringify(statuses));
    return true;
  }catch(e){ return false; }
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(statuses, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'respaldo_seguimiento_'+stamp+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackupFile(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const incoming = JSON.parse(e.target.result);
      statuses = Object.assign({}, statuses, incoming);
      await saveStatuses();
      renderAll();
      alert('Respaldo importado. Se combinó con lo que ya tenías en este dispositivo.');
    }catch(err){
      alert('No se pudo leer el archivo de respaldo. Verificá que sea un .json exportado desde esta misma app.');
    }
  };
  reader.readAsText(file);
}

function populateRegionSelect(){
  const regions = [...new Set(DATA.map(d=>d["Región"]))].sort();
  const sel = document.getElementById('regionSelect');
  regions.forEach(r=>{
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r.replace('Región ','');
    sel.appendChild(opt);
  });
}

function toTitleCase(s){
  return (s||'').toLowerCase().replace(/(^|\s)\S/g, c=>c.toUpperCase());
}

function populateProvinciaSelect(){
  const provincias = [...new Set(DATA.map(d=>d["Provincia"]))].sort();
  const sel = document.getElementById('provinciaSelect');
  provincias.forEach(p=>{
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = toTitleCase(p);
    sel.appendChild(opt);
  });
}

function populateCantonSelect(){
  const sel = document.getElementById('cantonSelect');
  const pool = activeProvincia === "ALL" ? DATA : DATA.filter(d=>d["Provincia"]===activeProvincia);
  const cantones = [...new Set(pool.map(d=>d["Cantón"]))].sort();
  sel.innerHTML = '<option value="ALL">Todos los cantones</option>';
  cantones.forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = toTitleCase(c);
    sel.appendChild(opt);
  });
  activeCanton = "ALL";
}

function matchesFilters(d){
  if(activePrioridad !== "ALL" && d.Prioridad !== activePrioridad) return false;
  if(activeRegion !== "ALL" && d["Región"] !== activeRegion) return false;
  if(activeProvincia !== "ALL" && d["Provincia"] !== activeProvincia) return false;
  if(activeCanton !== "ALL" && d["Cantón"] !== activeCanton) return false;
  if(activeEstado !== "ALL" && estadoOf(d.IDEO) !== activeEstado) return false;
  if(searchTerm){
    const hay = (d.Nombre+" "+effectiveNombre(d)+" "+d["Cantón"]+" "+d.Distrito+" "+d["Provincia"]).toLowerCase();
    if(!hay.includes(searchTerm.toLowerCase())) return false;
  }
  return true;
}

function renderFlowMeter(){
  const counts = {};
  ESTADOS.forEach(e=>counts[e]=0);
  DATA.forEach(d=>{ counts[estadoOf(d.IDEO)] = (counts[estadoOf(d.IDEO)]||0)+1; });
  const total = DATA.length;
  document.getElementById('flowTotal').textContent = total + ' clientes';
  const bar = document.getElementById('flowBar');
  bar.innerHTML = '';
  ESTADOS.forEach(e=>{
    if(counts[e]<=0) return;
    const span = document.createElement('span');
    span.style.width = (counts[e]/total*100)+'%';
    span.style.background = ESTADO_COLORS[e];
    bar.appendChild(span);
  });
  const legend = document.getElementById('flowLegend');
  legend.innerHTML = '';
  ESTADOS.forEach(e=>{
    const item = document.createElement('div');
    item.className='fitem';
    item.innerHTML = '<span class="fdot" style="background:'+ESTADO_COLORS[e]+'"></span>'+e+' · '+counts[e];
    legend.appendChild(item);
  });
}

function overallComplianceStatus(ideo){
  const st = statuses[ideo];
  if(!st || !st.sistemasList || !st.sistemasList.length) return null;
  let worst = null;
  st.sistemasList.forEach(s=>{
    const usuarios = parseFloat(s.usuarios)||0;
    if(usuarios<=0) return;
    const poblacion = usuarios*4;
    const rule = complianceRule(poblacion);
    [[s.ultimoRed, rule.redMeses],[s.ultimoFuentes, rule.fuentesMeses]].forEach(pair=>{
      const fecha = pair[0], meses = pair[1];
      if(!fecha) return;
      const next = addMonths(fecha, meses);
      const stt = statusForDate(next);
      if(stt.cls==='st-red') worst='red';
      else if(stt.cls==='st-amber' && worst!=='red') worst='amber';
    });
  });
  return worst;
}

function cardHTML(d){
  const prio = PRIO_META[d.Prioridad];
  const estado = estadoOf(d.IDEO);
  const tel = effectiveTelefono(d);
  const mail = effectiveCorreo(d);
  const hasTel = !!tel;

  if(compliance==='red'){ complianceTag = '<span class="tag" style="background:var(--c-bg); color:var(--c-fg)">Muestreo vencido</span>'; }
  else if(compliance==='amber'){ complianceTag = '<span class="tag" style="background:var(--b-bg); color:var(--b-fg)">Muestreo próximo</span>'; }

function getFiltered(){
  return DATA.filter(matchesFilters);
}

function renderList(){
  const filtered = getFiltered();
  document.getElementById('resultCount').innerHTML = '<b>'+filtered.length+'</b> resultado'+(filtered.length===1?'':'s');
  const listEl = document.getElementById('list');
  const slice = filtered.slice(0, renderLimit);
  if(filtered.length===0){
    listEl.innerHTML = '<div class="empty"><div class="display">Sin resultados</div>Probá con otro filtro o término de búsqueda.</div>';
    return;
  }
  listEl.innerHTML = slice.map(cardHTML).join('');
  if(filtered.length > renderLimit){
    const btn = document.createElement('button');
    btn.className='load-more';
    btn.textContent = 'Cargar más ('+(filtered.length-renderLimit)+' restantes)';
    btn.onclick = ()=>{ renderLimit += 60; renderList(); };
    listEl.appendChild(btn);
  }
  listEl.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click', ()=> openDetail(card.dataset.ideo));
  });
}

function renderAll(){
  renderFlowMeter();
  renderList();
}

function buildConfirmationEmailBody(d){

  lines.push('Cédula jurídica: '+(cedula || 'No registrada'));

    lines.push('');

      if(!x.valor) return;
      lines.push((x.tipo==='correo'?'Correo alterno: ':'Teléfono alterno: ')+x.valor+(x.nota? ' ('+x.nota+')' : ''));
    });
  }
  lines.push('');

  lines.push('Administrador(a): '+(admin || 'No registrado')+(adminTel? ' - Tel: '+adminTel : ''));
  lines.push('Presidente(a) de Junta: '+(pres || 'No registrado')+(presTel? ' - Tel: '+presTel : ''));
  lines.push('');
  lines.push('DATOS TÉCNICOS DEL SISTEMA');
  currentSystems.forEach((s,i)=>{
    lines.push('Sistema '+(i+1)+': '+(s.fuentes||0)+' fuente(s) · '+(s.tanquesDist||0)+' tanque(s) de distribución · '+(s.tanquesReunion||0)+' tanque(s) de reunión de fuentes · red de distribución: '+(s.redDistribucion || 'no especificada'));

    if(usuarios>0){
      const poblacion = usuarios*4;
      const rule = complianceRule(poblacion);
      lines.push('   Usuarios: '+usuarios+' · Población abastecida: '+poblacion+' hab. · Muestreo red/tanq. distrib. cada '+rule.redMeses+' meses · Muestreo fuentes/tanq. reunión cada '+rule.fuentesMeses+' meses');

  });

  lines.push('');
  lines.push('Quedamos atentos,');
  lines.push('Agrotec Laboratorios Analíticos S.A.');

function sendConfirmationEmail(d){
  const mail = document.getElementById('f_correo').value;
  if(!mail || !mail.trim()){
    alert('Este acueducto no tiene correo registrado. Agregalo primero en el campo Correo.');
    return;
  }
  const subject = 'Confirmación de datos - '+document.getElementById('f_nombre').value+' - Agrotec Laboratorios';
  const body = buildConfirmationEmailBody(d);
  const url = 'mailto:'+mail+'?cc=ricardo.barquero%40agrotec.net&subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  window.location.href = url;
}

function computeSystemSamplePoints(sys){
  const points = [];
  const fuentes = parseFloat(sys.fuentes)||0;
  const tanquesReunion = parseFloat(sys.tanquesReunion)||0;
  const tanquesDist = parseFloat(sys.tanquesDist)||0;
  const cantidadRedes = parseFloat(sys.cantidadRedes)||0;

  if(fuentes>0 || tanquesReunion>0){
    let obs;
    if(tanquesReunion>0){
      obs = 'Se muestrea en el tanque de reunión de fuentes'+(fuentes>0?(' (representa '+fuentes+' fuente'+(fuentes===1?'':'s')+')'):'')+'.';
    } else if(fuentes===1){
      obs = 'Una sola fuente: se muestrea directamente en la fuente.';
    } else {
      obs = fuentes+' fuentes sin tanque de reunión — verificar puntos de muestreo.';
    }
    points.push({label:'Fuentes / T. reunión', codigo: sys.codigoFuentes||null, cantidad:1, observacion: obs+(sys.codigoFuentes?'':' Falta código de análisis.')});
  }

  if(tanquesDist>0){
    points.push({label:'Tanques de distribución', codigo: sys.codigoTanques||null, cantidad:tanquesDist, observacion: tanquesDist+' tanque(s), 1 muestra c/u.'+(sys.codigoTanques?'':' Falta código de análisis.')});
  }

  if(cantidadRedes>0){
    points.push({label:'Red de distribución (parámetros)', codigo: sys.codigoRed||null, cantidad:cantidadRedes, observacion: cantidadRedes+' red(es) × 1 muestra de parámetros.'+(sys.codigoRed?'':' Falta código N.')});
    points.push({label:'Red de distribución (CF y E. coli)', codigo:'AQT1540', cantidad:cantidadRedes*2, observacion: cantidadRedes+' red(es) × 2 muestras microbiológicas.'});
  }

  return points;
}

function aggregateSystemTotals(sys){
  const points = computeSystemSamplePoints(sys);
  let n1=0,n2=0,n3=0,micro=0,totalMuestras=0;
  const codigoCounts = {};
  points.forEach(p=>{
    totalMuestras += p.cantidad;
    if(p.codigo && SERVICE_CODES[p.codigo]){
      const c = SERVICE_CODES[p.codigo];
      n1 += c.n1*p.cantidad; n2 += c.n2*p.cantidad; n3 += c.n3*p.cantidad; micro += c.micro*p.cantidad;
      codigoCounts[p.codigo] = (codigoCounts[p.codigo]||0)+p.cantidad;
    }
  });
  return {points, n1, n2, n3, micro, totalMuestras, codigoCounts};
}

function aggregateAllSystems(){
  let n1=0,n2=0,n3=0,micro=0,totalMuestras=0; const codigoCounts={};
  currentSystems.forEach(sys=>{
    const a = aggregateSystemTotals(sys);
    n1+=a.n1; n2+=a.n2; n3+=a.n3; micro+=a.micro; totalMuestras+=a.totalMuestras;
    Object.keys(a.codigoCounts).forEach(k=>{ codigoCounts[k]=(codigoCounts[k]||0)+a.codigoCounts[k]; });
  });
  return {n1,n2,n3,micro,totalMuestras,codigoCounts};
}

function complianceRule(poblacion){
  const above = poblacion > 5000;
  return { redMeses: above?3:6, fuentesMeses: above?6:6 };
}

function addMonths(dateStr, months){
  if(!dateStr) return null;
  const parts = dateStr.split('-').map(Number);
  const d = new Date(parts[0], parts[1]-1, parts[2]);
  d.setMonth(d.getMonth()+months);
  return d;
}

function formatDateCR(d){
  if(!d) return '—';
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}

function statusForDate(nextDate){
  if(!nextDate) return {label:'Sin fecha base', cls:'st-gray'};
  const now = new Date(); now.setHours(0,0,0,0);
  const diffDays = Math.round((nextDate - now)/(1000*60*60*24));
  if(diffDays < 0) return {label:'Vencido', cls:'st-red'};
  if(diffDays <= 30) return {label:'Próximo', cls:'st-amber'};
  return {label:'Al día', cls:'st-green'};
}

function toISODateStr(dt){
  return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
}

function reminderGCalLink(nextDate, label){
  if(!nextDate) return '';
  const d = currentDetailD;
  const dName = d ? document.getElementById('f_nombre').value : '';
  const title = 'Recordatorio de muestreo - '+dName+' - '+label;
  const details = 'Según el Decreto 38924-S ya toca realizar este muestreo en '+dName+'. Coordinar cita con el cliente.';
  const url = buildGCalUrl(title, toISODateStr(nextDate), null, details);
  return '<a class="gcal-mini" href="'+url+'" target="_blank" title="Agregar recordatorio a Google Calendar">'+calendarIcon()+'</a>';
}

function renderComplianceCalendar(){
  const wrap = document.getElementById('complianceWrap');
  if(!wrap) return;
  const withUsers = currentSystems.filter(s=>(parseFloat(s.usuarios)||0)>0);
  if(withUsers.length===0){
    wrap.innerHTML = '<div class="summary-title">Calendario de muestreo</div><div class="compliance-empty">Indicá la cantidad de usuarios de cada sistema para calcular las fechas de muestreo según el Decreto 38924-S.</div>';
    return;
  }
  let rowsHtml = '';
  currentSystems.forEach((s,i)=>{
    const usuarios = parseFloat(s.usuarios)||0;
    if(usuarios<=0) return;
    const poblacion = usuarios*4;
    const rule = complianceRule(poblacion);
    const nextRed = s.ultimoRed ? addMonths(s.ultimoRed, rule.redMeses) : null;
    const nextFuentes = s.ultimoFuentes ? addMonths(s.ultimoFuentes, rule.fuentesMeses) : null;
    const stRed = statusForDate(nextRed);
    const stFuentes = statusForDate(nextFuentes);
    rowsHtml += '<tr><td>Sistema '+(i+1)+' · Red / T. distrib.</td><td class="mono">cada '+rule.redMeses+' m.</td><td class="mono">'+formatDateCR(nextRed)+'</td><td><span class="status-pill '+stRed.cls+'">'+stRed.label+'</span>'+reminderGCalLink(nextRed,'Sistema '+(i+1)+' Red/T. distrib.')+'</td></tr>';
    rowsHtml += '<tr><td>Sistema '+(i+1)+' · Fuentes / T. reunión</td><td class="mono">cada '+rule.fuentesMeses+' m.</td><td class="mono">'+formatDateCR(nextFuentes)+'</td><td><span class="status-pill '+stFuentes.cls+'">'+stFuentes.label+'</span>'+reminderGCalLink(nextFuentes,'Sistema '+(i+1)+' Fuentes/T. reunión')+'</td></tr>';
  });
  wrap.innerHTML = '<div class="summary-title">Calendario de muestreo (Decreto 38924-S)</div>'
    +'<div class="summary-table-wrap"><table class="summary-table">'
    +'<thead><tr><th>Punto de muestreo</th><th>Frecuencia</th><th>Próximo muestreo</th><th>Estado</th></tr></thead>'
    +'<tbody>'+rowsHtml+'</tbody>'
    +'</table></div>';
}

  if(agg.totalMuestras===0){
    alert('Todavía no hay códigos de análisis configurados en "Datos técnicos del sistema". Completalos primero.');
    return;
  }
  currentMuestreos[idx].n1 = agg.n1;
  currentMuestreos[idx].n2 = agg.n2;
  currentMuestreos[idx].n3 = agg.n3;
  currentMuestreos[idx].micro = agg.micro;
  renderMuestreosSection();
  persistDetail();
}

function pad2(n){ return String(n).padStart(2,'0'); }

function buildGCalUrl(title, dateStr, timeStr, details){
  if(!dateStr) return null;
  let datesParam;
  if(timeStr){
    const [y,mo,da] = dateStr.split('-').map(Number);
    const [hh,mi] = timeStr.split(':').map(Number);
    const start = new Date(y, mo-1, da, hh, mi);
    const end = new Date(start.getTime()+60*60*1000);
    const fmt = (dt)=> dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate())+'T'+pad2(dt.getHours())+pad2(dt.getMinutes())+'00';
    datesParam = fmt(start)+'/'+fmt(end);
  } else {
    const [y,mo,da] = dateStr.split('-').map(Number);
    const start = new Date(y, mo-1, da);
    const end = new Date(start.getTime()+24*60*60*1000);
    const fmtDay = (dt)=> dt.getFullYear()+pad2(dt.getMonth()+1)+pad2(dt.getDate());
    datesParam = fmtDay(start)+'/'+fmtDay(end);
  }
  const params = new URLSearchParams({action:'TEMPLATE', text:title, dates:datesParam, details: details||''});
  return 'https://calendar.google.com/calendar/render?'+params.toString();
}

function openGCalForOrder(idx){
  const m = currentMuestreos[idx];
  if(!m || !m.fecha){ alert('Agregá primero la fecha pactada del muestreo.'); return; }
  const d = currentDetailD;
  const total = (parseFloat(m.n1)||0)+(parseFloat(m.n2)||0)+(parseFloat(m.n3)||0)+(parseFloat(m.micro)||0);
  const title = 'Muestreo - '+(d? document.getElementById('f_nombre').value : '')+' - Orden '+(m.numeroOrden || (idx+1));
  const details = 'Muestreador: '+(m.muestreador||'no asignado')+'\nMuestras: N1='+(m.n1||0)+', N2='+(m.n2||0)+', N3='+(m.n3||0)+', Microbiología='+(m.micro||0)+'\nTotal de muestras: '+total+'\nOrden: '+(m.numeroOrden||'—')+'\nAgrotec Laboratorios Analíticos S.A.';
  const url = buildGCalUrl(title, m.fecha, m.hora||null, details);
  if(url) window.open(url, '_blank');
}
